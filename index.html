<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GibajÄ…ce profilowe</title>
    <style>
:root {
  color-scheme: dark;
  --bg: #100f17;
  --ink: #fff7fb;
  --muted: #cbbfcd;
  --accent: #ff8fbe;
  --accent-2: #8ee6d7;
}

* {
  box-sizing: border-box;
}

html,
body {
  min-height: 100%;
}

body {
  margin: 0;
  overflow: hidden;
  font-family:
    Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
    sans-serif;
  background: #101018;
  color: var(--ink);
  user-select: none;
}

.stage {
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 28px;
}

.pet-card {
  width: min(92vw, 470px);
  min-height: min(90vh, 650px);
  display: grid;
  grid-template-rows: auto 1fr auto;
  align-items: center;
  gap: 24px;
  padding: 22px;
}

.topbar {
  justify-self: end;
  display: flex;
  gap: 10px;
  padding: 8px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(18px);
  box-shadow: none;
}

.icon-button {
  width: 44px;
  height: 44px;
  display: grid;
  place-items: center;
  border: 0;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.1);
  color: var(--ink);
  font: 700 24px/1 system-ui;
  cursor: pointer;
  transition:
    transform 160ms ease,
    background 160ms ease;
}

.icon-button:hover {
  transform: translateY(-1px);
  background: rgba(255, 255, 255, 0.17);
}

.upload {
  font-size: 28px;
}

input[type="file"] {
  position: absolute;
  inline-size: 1px;
  block-size: 1px;
  opacity: 0;
  pointer-events: none;
}

.avatar-wrap {
  position: relative;
  justify-self: center;
  width: min(78vw, 390px);
  aspect-ratio: 1;
  display: grid;
  place-items: center;
  touch-action: none;
  cursor: grab;
  perspective: 900px;
}

.avatar-wrap:active {
  cursor: grabbing;
}

.squish-shadow {
  position: absolute;
  bottom: 2%;
  width: 64%;
  height: 11%;
  border-radius: 999px;
  background: rgba(0, 0, 0, 0.24);
  filter: blur(14px);
  transform: translateY(34px);
}

.avatar {
  position: relative;
  width: 100%;
  height: 100%;
  overflow: hidden;
  border-radius: 34%;
  background:
    radial-gradient(circle at 42% 36%, #ffe5ee 0 9%, transparent 10%),
    radial-gradient(circle at 55% 54%, #f7b0c6 0 14%, transparent 15%),
    linear-gradient(135deg, #2b2130 0%, #8f4968 45%, #ffd0dc 100%);
  box-shadow:
    inset 0 0 0 8px rgba(255, 255, 255, 0.13),
    inset 20px 22px 45px rgba(255, 255, 255, 0.13),
    inset -22px -26px 54px rgba(47, 18, 41, 0.32),
    0 26px 58px rgba(0, 0, 0, 0.34);
  transform:
    translate3d(var(--tx, 0px), var(--ty, 0px), 0)
    rotateX(var(--rx, 0deg))
    rotateY(var(--ry, 0deg))
    rotateZ(var(--rz, 0deg))
    scaleX(var(--sx, 1))
    scaleY(var(--sy, 1));
  transform-origin: var(--origin-x, 50%) var(--origin-y, 50%);
  will-change: transform, border-radius;
}

.avatar.squishing {
  border-radius: 38% 31% 36% 33%;
}

.avatar img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: none;
  pointer-events: none;
}

.avatar.has-image img {
  display: block;
}

.avatar.has-image .default-face {
  display: none;
}

.default-face {
  position: absolute;
  inset: 0;
}

.ears::before,
.ears::after {
  content: "";
  position: absolute;
  top: 8%;
  width: 30%;
  height: 22%;
  border: 8px solid rgba(255, 255, 255, 0.9);
  border-bottom: 0;
  border-radius: 60% 60% 0 0;
  filter: drop-shadow(0 2px 0 rgba(255, 255, 255, 0.25));
}

.ears::before {
  left: 11%;
  transform: rotate(-24deg);
}

.ears::after {
  right: 6%;
  transform: rotate(31deg);
}

.face-glow {
  position: absolute;
  inset: 24% 17% 12%;
  border-radius: 45% 40% 42% 46%;
  background:
    radial-gradient(circle at 58% 35%, #fff6f7 0 8%, transparent 9%),
    radial-gradient(circle at 42% 62%, #e3829f 0 14%, transparent 15%),
    linear-gradient(150deg, #fad6df, #ba728e 54%, #6c405b);
  box-shadow: inset -22px -18px 42px rgba(70, 21, 50, 0.27);
}

.eyes::before,
.eyes::after {
  content: "";
  position: absolute;
  top: 43%;
  width: 15%;
  height: 8%;
  border-radius: 999px;
  background: #fff7fb;
  box-shadow: inset 0 -5px 0 rgba(41, 28, 43, 0.75);
}

.eyes::before {
  left: 32%;
  transform: rotate(9deg);
}

.eyes::after {
  right: 31%;
  transform: rotate(-10deg);
}

.mouth {
  position: absolute;
  left: 48%;
  top: 61%;
  width: 24%;
  height: 8%;
  border-bottom: 5px solid rgba(65, 30, 54, 0.62);
  border-radius: 0 0 999px 999px;
  transform: translateX(-50%) rotate(-4deg);
}

.whiskers::before,
.whiskers::after {
  content: "";
  position: absolute;
  width: 25%;
  height: 5px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.94);
}

.whiskers.left::before {
  left: 16%;
  top: 56%;
  transform: rotate(8deg);
}

.whiskers.left::after {
  left: 18%;
  top: 62%;
  transform: rotate(-4deg);
}

.whiskers.right::before {
  right: 15%;
  top: 56%;
  transform: rotate(-7deg);
}

.whiskers.right::after {
  right: 17%;
  top: 62%;
  transform: rotate(5deg);
}

.shine {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at var(--mx, 50%) var(--my, 50%), rgba(255, 255, 255, 0.34), transparent 17%),
    linear-gradient(115deg, rgba(255, 255, 255, 0.18), transparent 42%);
  mix-blend-mode: screen;
  opacity: var(--shine, 0.36);
  pointer-events: none;
}

.rub-ripples {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

.ripple {
  position: absolute;
  width: 70px;
  height: 70px;
  border: 2px solid rgba(255, 255, 255, 0.72);
  border-radius: 50%;
  transform: translate(-50%, -50%) scale(0.25);
  animation: ripple 620ms ease-out forwards;
}

@keyframes ripple {
  to {
    opacity: 0;
    transform: translate(-50%, -50%) scale(1.6);
  }
}

.hint {
  justify-self: center;
  display: flex;
  align-items: baseline;
  gap: 9px;
  max-width: 100%;
  padding: 12px 18px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255, 255, 255, 0.12);
  color: var(--muted);
  box-shadow: none;
  backdrop-filter: blur(16px);
}

.hint strong {
  color: var(--ink);
}

@media (max-width: 560px) {
  body {
    overflow: hidden;
  }

  .stage {
    min-height: 100svh;
    height: 100svh;
    padding: 18px;
  }

  .pet-card {
    width: 100%;
    min-height: 100%;
    gap: 14px;
    padding: 12px 0 22px;
  }

  .topbar {
    margin-right: 4px;
  }

  .avatar-wrap {
    width: min(86vw, 390px);
  }

  .hint {
    font-size: 15px;
    white-space: normal;
    border-radius: 20px;
    text-align: center;
  }
}

</style>
  </head>
  <body>
    <main class="stage">
      <section class="pet-card" aria-label="Interaktywne profilowe">
        <div class="topbar">
          <button class="icon-button" id="resetBtn" type="button" aria-label="Resetuj gibanie" title="Resetuj">
            <span aria-hidden="true">â†º</span>
          </button>
          <label class="icon-button upload" for="avatarInput" aria-label="Wgraj zdjÄ™cie" title="Wgraj zdjÄ™cie">
            <span aria-hidden="true">ï¼‹</span>
          </label>
          <input id="avatarInput" type="file" accept="image/*" />
        </div>

        <div class="avatar-wrap" id="avatarWrap">
          <div class="squish-shadow"></div>
          <div class="avatar" id="avatar" role="img" aria-label="Profilowe do gÅ‚askania">
            <img id="avatarImg" alt="" />
            <div class="default-face" id="defaultFace">
              <div class="ears"></div>
              <div class="face-glow"></div>
              <div class="eyes"></div>
              <div class="mouth"></div>
              <div class="whiskers left"></div>
              <div class="whiskers right"></div>
            </div>
            <div class="shine"></div>
            <div class="rub-ripples" id="ripples"></div>
          </div>
        </div>

        <div class="hint">
          <strong>GÅ‚aszcz</strong>
          <span>kursorem albo palcem</span>
        </div>
      </section>
    </main>

    <script>
const wrap = document.querySelector("#avatarWrap");
const avatar = document.querySelector("#avatar");
const avatarImg = document.querySelector("#avatarImg");
const avatarInput = document.querySelector("#avatarInput");
const resetBtn = document.querySelector("#resetBtn");
const ripples = document.querySelector("#ripples");

const state = {
  x: 0,
  y: 0,
  vx: 0,
  vy: 0,
  rx: 0,
  ry: 0,
  rz: 0,
  sx: 1,
  sy: 1,
  pointerX: 0.5,
  pointerY: 0.5,
  touching: false,
  lastX: 0,
  lastY: 0,
  lastRipple: 0,
};

function setAvatarSource(src) {
  avatarImg.src = src;
  avatar.classList.add("has-image");
}

function loadDefaultProfile() {
  const image = new Image();
  image.addEventListener("load", () => setAvatarSource("./profile.jpg"));
  image.src = `./profile.jpg?cache=${Date.now()}`;
}

function clamp(value, min, max) {
  return Math.min(max, Math.max(min, value));
}

function setVars() {
  avatar.style.setProperty("--tx", `${state.x.toFixed(2)}px`);
  avatar.style.setProperty("--ty", `${state.y.toFixed(2)}px`);
  avatar.style.setProperty("--rx", `${state.rx.toFixed(2)}deg`);
  avatar.style.setProperty("--ry", `${state.ry.toFixed(2)}deg`);
  avatar.style.setProperty("--rz", `${state.rz.toFixed(2)}deg`);
  avatar.style.setProperty("--sx", state.sx.toFixed(3));
  avatar.style.setProperty("--sy", state.sy.toFixed(3));
  avatar.style.setProperty("--mx", `${(state.pointerX * 100).toFixed(1)}%`);
  avatar.style.setProperty("--my", `${(state.pointerY * 100).toFixed(1)}%`);
  avatar.style.setProperty("--origin-x", `${(state.pointerX * 100).toFixed(1)}%`);
  avatar.style.setProperty("--origin-y", `${(state.pointerY * 100).toFixed(1)}%`);
  avatar.style.setProperty("--shine", state.touching ? "0.68" : "0.36");
}

function addRipple(x, y) {
  const now = performance.now();
  if (now - state.lastRipple < 95) return;
  state.lastRipple = now;

  const rect = avatar.getBoundingClientRect();
  const ripple = document.createElement("span");
  ripple.className = "ripple";
  ripple.style.left = `${x - rect.left}px`;
  ripple.style.top = `${y - rect.top}px`;
  ripples.append(ripple);
  ripple.addEventListener("animationend", () => ripple.remove(), { once: true });
}

function touchAvatar(event) {
  const rect = avatar.getBoundingClientRect();
  const px = clamp((event.clientX - rect.left) / rect.width, 0, 1);
  const py = clamp((event.clientY - rect.top) / rect.height, 0, 1);
  const dx = event.clientX - state.lastX;
  const dy = event.clientY - state.lastY;
  const speed = Math.hypot(dx, dy);

  state.pointerX = px;
  state.pointerY = py;
  state.vx += clamp(dx * 0.24, -16, 16);
  state.vy += clamp(dy * 0.24, -16, 16);
  state.rx += clamp((0.5 - py) * speed * 0.08, -7, 7);
  state.ry += clamp((px - 0.5) * speed * 0.08, -7, 7);
  state.rz += clamp(dx * 0.055, -5, 5);
  state.sx = 1 + clamp(speed * 0.004, 0, 0.11);
  state.sy = 1 - clamp(speed * 0.0032, 0, 0.09);

  state.lastX = event.clientX;
  state.lastY = event.clientY;
  avatar.classList.add("squishing");
  addRipple(event.clientX, event.clientY);
  setVars();
}

function animate() {
  const spring = 0.105;
  const damping = state.touching ? 0.79 : 0.86;

  state.vx += (0 - state.x) * spring;
  state.vy += (0 - state.y) * spring;
  state.vx *= damping;
  state.vy *= damping;
  state.x += state.vx;
  state.y += state.vy;

  state.rx *= 0.86;
  state.ry *= 0.86;
  state.rz *= 0.84;
  state.sx += (1 - state.sx) * 0.16;
  state.sy += (1 - state.sy) * 0.16;

  if (!state.touching && Math.abs(state.sx - 1) < 0.01 && Math.abs(state.vx) < 0.15) {
    avatar.classList.remove("squishing");
  }

  setVars();
  requestAnimationFrame(animate);
}

wrap.addEventListener("pointerdown", (event) => {
  wrap.setPointerCapture(event.pointerId);
  state.touching = true;
  state.lastX = event.clientX;
  state.lastY = event.clientY;
  touchAvatar(event);
});

wrap.addEventListener("pointermove", (event) => {
  if (!state.touching) return;
  touchAvatar(event);
});

wrap.addEventListener("pointerup", (event) => {
  state.touching = false;
  state.vx += clamp((event.clientX - state.lastX) * 0.2, -8, 8);
  state.vy -= 7;
});

wrap.addEventListener("pointercancel", () => {
  state.touching = false;
});

wrap.addEventListener("pointerleave", () => {
  state.touching = false;
});

avatarInput.addEventListener("change", () => {
  const [file] = avatarInput.files;
  if (!file) return;
  const reader = new FileReader();
  reader.addEventListener("load", () => {
    setAvatarSource(reader.result);
  });
  reader.readAsDataURL(file);
});

resetBtn.addEventListener("click", () => {
  Object.assign(state, {
    x: 0,
    y: 0,
    vx: 0,
    vy: 0,
    rx: 0,
    ry: 0,
    rz: 0,
    sx: 1,
    sy: 1,
    pointerX: 0.5,
    pointerY: 0.5,
    touching: false,
  });
  setVars();
});

setVars();
loadDefaultProfile();
animate();

</script>
  </body>
</html>
